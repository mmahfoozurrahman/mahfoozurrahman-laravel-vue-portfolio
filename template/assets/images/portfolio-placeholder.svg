<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2e24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a11b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d98504;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#253a2d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Decorative Code Lines -->
  <rect x="30" y="40" width="100" height="8" rx="4" fill="#2d4838"/>
  <rect x="30" y="60" width="160" height="8" rx="4" fill="#2d4838"/>
  <rect x="50" y="80" width="120" height="8" rx="4" fill="#2d4838"/>
  <rect x="50" y="100" width="140" height="8" rx="4" fill="#2d4838"/>
  <rect x="30" y="120" width="80" height="8" rx="4" fill="#2d4838"/>
  
  <!-- Glowing Graphic -->
  <circle cx="280" cy="120" r="50" fill="url(#accentGrad)" opacity="0.15"/>
  <circle cx="280" cy="120" r="30" fill="url(#accentGrad)" opacity="0.3"/>
  <path d="M 260 120 L 275 135 L 305 105" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text Label -->
  <text x="200" y="210" font-family="'Space Mono', monospace" font-size="14" fill="#f2a11b" text-anchor="middle" letter-spacing="2">PROJECT PREVIEW</text>
  <text x="200" y="230" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#758a7d" text-anchor="middle">Laravel &amp; Vue App Showcase</text>
</svg>
