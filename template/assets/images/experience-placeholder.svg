<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2e24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a11b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d98504;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#253a2d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Minimal Laptop Outline -->
  <rect x="110" y="60" width="180" height="110" rx="6" fill="#132018" stroke="#2b3e32" stroke-width="3"/>
  <rect x="120" y="70" width="160" height="90" rx="3" fill="#1e2e24"/>
  <!-- Base -->
  <path d="M 80 170 L 320 170 L 310 180 L 90 180 Z" fill="#2b3e32"/>
  <rect x="175" y="170" width="50" height="4" rx="2" fill="#f2a11b" opacity="0.8"/>
  
  <!-- Server / Microservices Graphics -->
  <circle cx="160" cy="115" r="16" fill="url(#accentGrad)" opacity="0.8"/>
  <path d="M 152 115 L 168 115 M 160 107 L 160 123" stroke="#132018" stroke-width="2.5"/>
  <circle cx="200" cy="115" r="16" fill="url(#accentGrad)" opacity="0.8"/>
  <path d="M 193 115 L 207 115 M 200 107 L 200 123" stroke="#132018" stroke-width="2.5"/>
  <circle cx="240" cy="115" r="16" fill="url(#accentGrad)" opacity="0.8"/>
  <path d="M 233 115 L 247 115 M 240 107 L 240 123" stroke="#132018" stroke-width="2.5"/>
  
  <!-- Text Label -->
  <text x="200" y="210" font-family="'Space Mono', monospace" font-size="14" fill="#f2a11b" text-anchor="middle" letter-spacing="2">CRAFTSMANSHIP</text>
  <text x="200" y="230" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#758a7d" text-anchor="middle">Full-Stack System Engineering</text>
</svg>
